<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atendimento PRO — Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at 50% 32%, #12222f 0%, #0a1119 40%, #000 85%);
      color: #eaf4ff;
      overflow: hidden;
    }

    /* Tela de "carregando" enquanto o widget não abre */
    .loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      z-index: 1;
    }
    .spinner {
      width: 46px; height: 46px;
      border: 4px solid rgba(79,195,255,0.25);
      border-top-color: #4fc3ff;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin-bottom: 22px;
      filter: drop-shadow(0 0 10px rgba(23,169,255,0.5));
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: 0.02em; }
    .loading p { color: #9fb4c6; margin-top: 8px; font-size: 0.95rem; }

    /* ===== Força o widget do Chatwoot a ocupar a TELA INTEIRA ===== */
    .woot-widget-holder {
      top: 0 !important;
      left: 0 !important;
      right: 0 !important;
      bottom: 0 !important;
      width: 100% !important;
      height: 100% !important;
      max-height: 100% !important;
      max-width: 100% !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      z-index: 10 !important;
    }
    /* Esconde a bolha/launcher — abrimos automaticamente */
    .woot-widget-bubble,
    .woot--close,
    .woot--bubble-holder { display: none !important; }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <h1>Abrindo seu atendimento…</h1>
    <p>Aguarde um instante, já vamos te conectar. 💬</p>
  </div>

  <script>
    var CHATWOOT_BASE_URL = "https://atendimentopro-chatwoot.9fd2lk.easypanel.host";
    var CHATWOOT_TOKEN = "9QNgXgtUh2oV2n5y9KaVsj1V";

    window.chatwootSettings = { hideMessageBubble: true, position: "right", type: "standard" };

    (function (d, t) {
      var g = d.createElement(t), s = d.getElementsByTagName(t)[0];
      g.src = CHATWOOT_BASE_URL + "/packs/js/sdk.js";
      g.defer = true;
      g.async = true;
      s.parentNode.insertBefore(g, s);
      g.onload = function () {
        window.chatwootSDK.run({
          websiteToken: CHATWOOT_TOKEN,
          baseUrl: CHATWOOT_BASE_URL,
        });
      };
    })(document, "script");

    // Abre o chat automaticamente e some com a tela de carregando
    window.addEventListener("chatwoot:ready", function () {
      window.$chatwoot.toggle("open");
      var el = document.getElementById("loading");
      if (el) setTimeout(function () { el.style.display = "none"; }, 400);
    });
  </script>
</body>
</html>
