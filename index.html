<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atendimento PRO — Suporte</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="favicon.png" />
  <style>
    :root {
      --bg-1: #12222f;
      --bg-2: #0a1119;
      --bg-3: #000000;
      --neon: #17a9ff;
      --neon-soft: #4fc3ff;
      --neon-glow: rgba(23, 169, 255, 0.55);
      --text: #eaf4ff;
      --muted: #9fb4c6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at 50% 32%, var(--bg-1) 0%, var(--bg-2) 40%, var(--bg-3) 85%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ---------- Navbar ---------- */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px 32px;
      background: rgba(12, 18, 24, 0.55);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(79, 195, 255, 0.18);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .navbar .brand {
      font-weight: 800;
      letter-spacing: 0.02em;
      font-size: 1.15rem;
      color: var(--text);
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .navbar .brand .badge {
      color: var(--neon-soft);
      text-shadow: 0 0 12px var(--neon-glow);
    }
    .navbar nav {
      display: flex;
      gap: 26px;
    }
    .navbar nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.92rem;
      font-weight: 500;
      transition: color 0.2s ease;
    }
    .navbar nav a:hover { color: var(--neon-soft); }

    /* ---------- Conteúdo central ---------- */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 20px;
    }

    .hero-logo {
      width: min(520px, 88vw);
      height: auto;
      filter: drop-shadow(0 0 40px var(--neon-glow));
      margin-bottom: 40px;
      user-select: none;
    }

    /* ---------- Botão neon glossy ---------- */
    .cta-button {
      position: relative;
      background: linear-gradient(180deg, var(--neon-soft) 0%, var(--neon) 55%, #0f86d6 100%);
      color: #fff;
      border: none;
      font-size: clamp(1.05rem, 2.6vw, 1.25rem);
      font-weight: 700;
      letter-spacing: 0.01em;
      padding: 20px 46px;
      border-radius: 999px;
      cursor: pointer;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.25);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.25) inset,
        0 8px 22px rgba(0, 0, 0, 0.35),
        0 0 34px var(--neon-glow);
      transition: transform 0.15s ease, box-shadow 0.25s ease, filter 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }
    .cta-button:hover {
      transform: translateY(-2px);
      filter: brightness(1.08);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.35) inset,
        0 10px 26px rgba(0, 0, 0, 0.4),
        0 0 48px var(--neon-glow);
    }
    .cta-button:active { transform: translateY(0); }
    .cta-button svg { width: 24px; height: 24px; flex-shrink: 0; }

    /* ---------- Setas indicando o botão ---------- */
    .cta-wrap {
      display: inline-flex;
      align-items: center;
      gap: 40px;
    }
    .cta-arrow {
      width: 40px;
      height: 40px;
      color: var(--neon-soft);
      flex-shrink: 0;
      filter: drop-shadow(0 0 8px var(--neon-glow));
    }
    .cta-arrow.left  { animation: nudge-right 1.1s ease-in-out infinite; }
    .cta-arrow.right { animation: nudge-left  1.1s ease-in-out infinite; }

    @keyframes nudge-right {
      0%, 100% { transform: translateX(0);    opacity: 0.55; }
      50%      { transform: translateX(10px); opacity: 1; }
    }
    @keyframes nudge-left {
      0%, 100% { transform: translateX(0);     opacity: 0.55; }
      50%      { transform: translateX(-10px); opacity: 1; }
    }

    @media (max-width: 560px) {
      .cta-arrow { width: 30px; height: 30px; }
      .cta-wrap { gap: 18px; }
    }

    /* ---------- Footer ---------- */
    footer {
      background: rgba(12, 18, 24, 0.55);
      border-top: 1px solid rgba(79, 195, 255, 0.18);
      padding: 24px 32px;
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
    }
    footer .footer-links { display: flex; gap: 20px; flex-wrap: wrap; }
    footer .footer-links a {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s ease;
    }
    footer .footer-links a:hover { color: var(--neon-soft); }
    footer .hours { color: var(--neon-soft); }

    @media (max-width: 560px) {
      .navbar { padding: 14px 18px; }
      .navbar nav { gap: 16px; }
      footer { flex-direction: column; text-align: center; }
    }
  </style>
</head>
<body>
  <!-- ---------- Navbar ---------- -->
  <header class="navbar">
    <nav>
      <a href="#">Início</a>
    </nav>
  </header>

  <!-- ---------- Conteúdo ---------- -->
  <main>
    <img class="hero-logo" src="ATENDIMENTO PRO DEFINITIVA.png" alt="Atendimento PRO — Suporte das 08:00 às 23:30" />

    <div class="cta-wrap">
      <!-- Seta esquerda apontando para o botão -->
      <svg class="cta-arrow left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14"/>
        <path d="M13 6l6 6-6 6"/>
      </svg>

      <button class="cta-button" id="btn-atendente">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        FALAR COM ATENDENTE
      </button>

      <!-- Seta direita apontando para o botão -->
      <svg class="cta-arrow right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5"/>
        <path d="M11 6l-6 6 6 6"/>
      </svg>
    </div>
  </main>

  <!-- ---------- Footer ---------- -->
  <footer>
    <div>© 2026 Todos os Direitos Reservados.</div>
  </footer>

  <!-- ============================================================= -->
  <!-- O botão abre a página do chat (chat.html) em uma NOVA ABA.     -->
  <!-- A página inicial NÃO carrega o widget, por isso não aparece    -->
  <!-- a bolha no canto.                                              -->
  <!-- ============================================================= -->
  <script>
    document.getElementById("btn-atendente").addEventListener("click", function () {
      window.location.href = "chat.html";
    });
  </script>
</body>
</html>
